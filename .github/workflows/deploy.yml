name: Laravel Deploy

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - closed
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)

    steps:
      - name: Code Checkout
        uses: actions/checkout@v3

      - name: PHP Version Check
        run: php --version

      - name: Deploy Script Chalao
        run: |
          cd /var/www/html/myapp
          bash deploy.sh

      - name: Success Message
        run: echo "✅ Laravel Deploy Ho Gaya!"